<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="options.css">
  <title>Wellbeing Tracker Settings</title>
</head>
<body>
  <div class="container">
    <header>
      <h1>Wellbeing Tracker Settings</h1>
      <p class="subtitle">Set your daily limits for each category to receive gentle reminders.</p>
    </header>

    <div class="settings-card">
      <h2>Daily Category Limits (Minutes)</h2>
      <div id="limits-container">
        <!-- populated dynamically -->
      </div>
      <button id="save-btn">Save Settings</button>
      <div id="save-msg" class="success-msg">Settings saved successfully!</div>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
